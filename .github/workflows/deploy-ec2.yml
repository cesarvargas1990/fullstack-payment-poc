name: Deploy to EC2

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-ec2.yml'
      - 'Dockerfile'
      - 'docker-compose.yml'
      - 'backend/**'

jobs:
  deploy:
    name: Deploy backend on EC2
    runs-on: ubuntu-latest

    steps:
      - name: Deploy through SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e
            cd ${{ secrets.EC2_APP_PATH }}
            git fetch origin main
            git reset --hard origin/main
            docker compose --env-file backend/.env up --build -d
            docker compose --env-file backend/.env ps
            for attempt in $(seq 1 30); do
              if curl -fsS http://localhost:3000/products > /tmp/products-response.json; then
                cat /tmp/products-response.json
                exit 0
              fi

              echo "Waiting for API to be ready... attempt ${attempt}/30"
              sleep 2
            done

            docker compose --env-file backend/.env ps
            docker logs checkout-api --tail=100
            exit 1
 
