services:
  mysql:
    image: mysql:8.4
    container_name: checkout-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: checkout
      MYSQL_USER: checkout
      MYSQL_PASSWORD: checkout
      MYSQL_ROOT_PASSWORD: root
    expose:
      - "3306"
    volumes:
      - checkout_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$${MYSQL_ROOT_PASSWORD} --silent"]
      start_period: 60s
      interval: 10s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: checkout-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: checkout
      DB_PASSWORD: checkout
      DB_NAME: checkout
      PAYMENTS_MODE: ${PAYMENTS_MODE:-sandbox}
      PAYMENT_PROVIDER_BASE_URL: ${PAYMENT_PROVIDER_BASE_URL:-}
      PAYMENT_PROVIDER_PUBLIC_KEY: ${PAYMENT_PROVIDER_PUBLIC_KEY:-}
      PAYMENT_PROVIDER_PRIVATE_KEY: ${PAYMENT_PROVIDER_PRIVATE_KEY:-}
      PAYMENT_PROVIDER_INTEGRITY_SECRET: ${PAYMENT_PROVIDER_INTEGRITY_SECRET:-}
      PAYMENT_PROVIDER_POLL_ATTEMPTS: ${PAYMENT_PROVIDER_POLL_ATTEMPTS:-5}
      PAYMENT_PROVIDER_POLL_INTERVAL_MS: ${PAYMENT_PROVIDER_POLL_INTERVAL_MS:-1000}
    ports:
      - "3000:3000"

volumes:
  checkout_mysql_data:
