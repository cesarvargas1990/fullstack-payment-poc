services:
  mysql:
    image: mysql:8.4
    container_name: checkout-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: checkout
      MYSQL_USER: checkout
      MYSQL_PASSWORD: checkout
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - checkout_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "checkout", "-pcheckout"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: checkout-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      PORT: 3000
      DB_HOST: mysql
      DB_PORT: 3306
      DB_USER: checkout
      DB_PASSWORD: checkout
      DB_NAME: checkout
      PAYMENTS_MODE: sandbox
    ports:
      - "3000:3000"

volumes:
  checkout_mysql_data:
